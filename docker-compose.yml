version: "3.9"

services:
  app:
    build: .
    container_name: rails_app
    volumes:
      - .:/app
      - rails_db:/app/db # Store sqlite db file persistently
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=development
    tty: true
    stdin_open: true
    command: bash -c "rm -f tmp/pids/server.pid && ./bin/rails server -b 0.0.0.0 -p 3000"

volumes:
  rails_db: